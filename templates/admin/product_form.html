{% extends 'base.html' %}

{% block title %}{{ title }} | Mackkas Admin{% endblock %}

{% block extra_css %}
<style>
    .admin-container {
        padding: 40px 0;
        min-height: 80vh;
    }
    .admin-header {
        margin-bottom: 40px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--color-neutral-100);
    }
    .admin-title {
        font-family: var(--font-serif);
        font-size: 32px;
        font-weight: 400;
    }
    .form-container {
        max-width: 600px;
        background: var(--color-white);
        border: 1px solid var(--color-neutral-100);
        padding: 40px;
    }
    .form-group {
        margin-bottom: 24px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
    }
    .form-control {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--color-neutral-300);
        font-family: inherit;
        font-size: 14px;
    }
    .form-actions {
        display: flex;
        gap: 16px;
        margin-top: 32px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container admin-container">
    <header class="admin-header">
        <h1 class="admin-title">{{ title }}</h1>
    </header>

    <div class="form-container">
        <form method="POST">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-control" rows="4" required>{{ product.description if product else '' }}</textarea>
            </div>

            <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" name="price" class="form-control" step="0.01" value="{{ product.price if product else '' }}" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-control" required>
                        <option value="women" {% if product and product.category == 'women' %}selected{% endif %}>Women</option>
                        <option value="men" {% if product and product.category == 'men' %}selected{% endif %}>Men</option>
                        <option value="jewelry" {% if product and product.category == 'jewelry' %}selected{% endif %}>Jewelry</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="cloth_type">Product Type (e.g., dress, suit, ring)</label>
                <input type="text" id="cloth_type" name="cloth_type" class="form-control" value="{{ product.cloth_type if product else '' }}" required>
            </div>

            <div class="form-group">
                <label for="img1">Main Image Path (e.g., datasets/women-bags/01.jpg)</label>
                <input type="text" id="img1" name="img1" class="form-control" value="{{ product.img1 if product else '' }}" required>
            </div>

            <div class="form-group">
                <label for="img2">Secondary Image Path (Optional)</label>
                <input type="text" id="img2" name="img2" class="form-control" value="{{ product.img2 if product else '' }}">
            </div>

            <div class="form-actions">
                <button type="submit" class="button button--primary">Save Product</button>
                <a href="{{ url_for('admin.products') }}" class="button button--outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
