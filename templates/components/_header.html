<header class="header">
    <div class="container">
        <nav class="nav__content">
            <div class="nav__mobile-toggle">
                <button class="nav__icon" id="openMobileMenu" aria-label="Open Menu">
                    <iconify-icon icon="lucide:menu"></iconify-icon>
                </button>
            </div>

            <ul class="nav__menu desktop-only">
                <li><a href="{{ url_for('product_catalog') }}" class="nav__link">Shop</a></li>
                <li><a href="{{ url_for('product_catalog') }}" class="nav__link">New in</a></li>
                <li><a href="{{ url_for('about_page') }}" class="nav__link">About</a></li>
            </ul>

            <a href="/" class="nav__logo">
                Mackkas
            </a>

            <div class="nav__actions">
                <a href="{{ url_for('search_page') }}" class="nav__icon desktop-only" aria-label="Search">
                    <iconify-icon icon="lucide:search"></iconify-icon>
                </a>
                <a href="{{ url_for('profile_page') }}" class="nav__icon" aria-label="Account">
                    <iconify-icon icon="lucide:user"></iconify-icon>
                </a>
                <button class="nav__icon nav__cart" id="openCartBtn" aria-label="Cart">
                    <iconify-icon icon="lucide:shopping-bag"></iconify-icon>
                    <span class="badge" id="cartCountBadge">0</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Mobile Navigation Drawer -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu__header">
            <a href="/" class="nav__logo">Mackkas</a>
            <button class="nav__icon" id="closeMobileMenu" aria-label="Close Menu">
                <iconify-icon icon="lucide:x"></iconify-icon>
            </button>
        </div>
        <div class="mobile-menu__search">
            <form action="{{ url_for('search_page') }}" method="GET">
                <input type="text" name="q" placeholder="Search our jewelry" class="mobile-menu__search-input">
                <button type="submit" class="mobile-menu__search-btn">
                    <iconify-icon icon="lucide:search"></iconify-icon>
                </button>
            </form>
        </div>
        <ul class="mobile-menu__list">
            <li><a href="{{ url_for('product_catalog') }}" class="mobile-menu__link">Shop All</a></li>
            <li><a href="{{ url_for('product_catalog') }}" class="mobile-menu__link">New Arrivals</a></li>
            <li><a href="{{ url_for('about_page') }}" class="mobile-menu__link">Our Story</a></li>
            <li><a href="{{ url_for('contact_page') }}" class="mobile-menu__link">Contact</a></li>
        </ul>
        <div class="mobile-menu__footer">
            <div class="mobile-menu__social">
                <a href="#" class="nav__icon"><iconify-icon icon="lucide:instagram"></iconify-icon></a>
                <a href="#" class="nav__icon"><iconify-icon icon="lucide:facebook"></iconify-icon></a>
                <a href="#" class="nav__icon"><iconify-icon icon="lucide:twitter"></iconify-icon></a>
            </div>
        </div>
    </div>
    <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>
</header>
