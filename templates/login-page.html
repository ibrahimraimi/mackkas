<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mackkas | Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login-page.css') }}">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon/favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/favicon/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/favicon/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='images/favicon/site.webmanifest') }}">
</head>
<body>
    <div class="split-layout">
        <div class="auth-visual">
            <img src="{{ url_for('static', filename='images/red-wine-gown.png') }}" alt="Mackkas Style" class="auth-visual__img">
        </div>

        <div class="auth-form-container">
            <div class="auth-form-card">
                <div class="auth-form-header">
                    <h1>Welcome Back</h1>
                    <p>Enter your details to access your account</p>
                </div>

                <form id="loginform" class="auth-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" placeholder="Enter your username" required>
                            <iconify-icon icon="lucide:user"></iconify-icon>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="Enter your password" required>
                            <iconify-icon icon="lucide:lock"></iconify-icon>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" id="btnform" class="button button--primary w-full">Sign In</button>

                    <p class="auth-switch">
                        Don't have an account? 
                        <a href="{{ url_for('signup_page') }}">Create one</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- Feedbacks -->
    <div class="toast-container">
        <div class="successful_hide" id="successToast">
            <iconify-icon icon="lucide:check-circle"></iconify-icon>
            <span>Login Successful</span>
        </div>
        <div class="validate_hide" id="errorToast">
            <iconify-icon icon="lucide:alert-circle"></iconify-icon>
            <span id="errorMsg">Invalid Credentials</span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/login-page.js') }}"></script>
</body>
</html>
