<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mackkas | Join Us</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/signup-page.css') }}">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon/favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/favicon/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/favicon/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='images/favicon/site.webmanifest') }}">
</head>
<body>
    <div class="split-layout">
        <div class="auth-visual">
            <img src="{{ url_for('static', filename='images/red-wine-gown.png') }}" alt="Mackkas Elegance" class="auth-visual__img">
        </div>

        <div class="auth-form-container">
            <div class="auth-form-card">
                <div class="auth-form-header">
                    <h1>Create Account</h1>
                    <p>Register to start your minimalist fashion journey</p>
                </div>

                <form id="signupform" class="auth-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="name" placeholder="Enter your full name" required>
                            <iconify-icon icon="lucide:user-plus"></iconify-icon>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="Enter your email" required>
                            <iconify-icon icon="lucide:mail"></iconify-icon>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" placeholder="Choose a username" required>
                            <iconify-icon icon="lucide:at-sign"></iconify-icon>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="Create a password" required>
                            <iconify-icon icon="lucide:lock"></iconify-icon>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirm-password" placeholder="Repeat password" required>
                            <iconify-icon icon="lucide:shield-check"></iconify-icon>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" required>
                            I agree to the <a href="#">Terms & Conditions</a>
                        </label>
                    </div>

                    <button type="submit" id="signup_btn" class="button button--primary w-full">Join Mackkas</button>

                    <p class="auth-switch">
                        Already have an account? 
                        <a href="{{ url_for('login_page') }}">Sign in instead</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- Feedbacks -->
    <div class="toast-container">
        <div class="successful_hide" id="successToast">
            <iconify-icon icon="lucide:check-circle"></iconify-icon>
            <span>Account Created</span>
        </div>
        <div class="validate_hide" id="errorToast">
            <iconify-icon icon="lucide:alert-circle"></iconify-icon>
            <span id="errMsg">Signup Failed</span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/signup-page.js') }}"></script>
</body>
</html>
